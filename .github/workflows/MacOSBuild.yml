name: MacOSBuild

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  Build:
    name: BuildAndTest
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: SetupRuby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - name: CacheVendor
        id: vendor-cache
        uses: actions/cache@v4
        with:
          path: Vendor
          key: Vendor-${{ runner.os }}-${{ hashFiles('Scripts/Dependencies/**/*.rb') }}

      - name: InstallDependencies
        if: steps.vendor-cache.outputs.cache-hit != 'true'
        run: ruby Scripts/Dependencies/InstallDependencies.rb

      - name: VerifyVendor
        run: |
          echo "Vendor directory contents:"
          ls -la Vendor/ || echo "Vendor directory not found"
          echo "SDL3 directory contents:"
          ls -la Vendor/SDL3/ || echo "SDL3 directory not found"
          echo "SDL3 include contents:"
          ls -la Vendor/SDL3/include/ || echo "SDL3 include not found"

      - name: SetupDotnet
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "9.0.x"

      - name: CacheNuGet
        id: nuget-cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: RunBuilder
        run: dotnet run --project Builder/Builder.csproj -- build --format ninja --config release

      - name: InstallNinja
        run: brew install ninja || true

      - name: BuildProject
        run: ninja

      - name: FindExecutable
        shell: bash
        run: |
          if [ -f Binaries/BaseExample/BaseExample ]; then
            echo "Executable found"
            exit 0
          else
            echo "Executable not found"
            exit 84
          fi
