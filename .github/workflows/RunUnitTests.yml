name: Run Unit Tests

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]

jobs:
  Build:
    name: RunUnitTests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v12

      - name: Build the project
        run: nix develop --command lumen test
