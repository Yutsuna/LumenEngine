name: LinuxBuild

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  Build:
    name: BuildAndTest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: SetupRuby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - name: InstallSystemDependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            pkg-config \
            libx11-dev \
            libxext-dev \
            libxcursor-dev \
            libxfixes-dev \
            libxi-dev \
            libxrandr-dev \
            libxss-dev \
            libxtst-dev \
            libxrender-dev \
            libdrm-dev \
            libgbm-dev \
            libasound2-dev \
            libpulse-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libegl1-mesa-dev \
            libibus-1.0-dev \
            ninja-build

      - name: CacheVendor
        id: vendor-cache
        uses: actions/cache@v4
        with:
          path: Vendor
          key: Vendor-${{ runner.os }}-${{ hashFiles('Scripts/Dependencies/**/*.rb') }}

      - name: InstallDependencies
        if: steps.vendor-cache.outputs.cache-hit != 'true'
        run: ruby Scripts/Dependencies/InstallDependencies.rb

      - name: SetupDotnet
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "10.0.100"

      - name: CacheNuGet
        id: nuget-cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: RunBuilder Ninja
        run: dotnet run --project Builder/Builder.csproj -- build --format ninja --config release

      - name: RunBuilder Makefile
        run: dotnet run --project Builder/Builder.csproj -- build --format makefile --config release

      - name: RunBuilder CMake
        run: dotnet run --project Builder/Builder.csproj -- build --format cmake --config release

      - name: RunBuilder Ninja
        run: dotnet run --project Builder/Builder.csproj -- build --format ninja --config release

      - name: Build Ninja
        run: ninja -j$(nproc)

      - name: Check & Clean Ninja
        run: |
          if [ -f Binaries/BaseExample/BaseExample ]; then
            echo "Ninja build successful"
            ninja -t clean
          else
            echo "Ninja build failed: Executable not found"
            exit 84
          fi

      - name: Build Makefile
        run: make -j$(nproc)

      - name: Check & Clean Makefile
        run: |
          if [ -f Binaries/BaseExample/BaseExample ]; then
            echo "Makefile build successful"
            make clean
          else
            echo "Makefile build failed: Executable not found"
            exit 84
          fi

      - name: Build CMake
        run: |
          cmake .
          cmake --build .

      - name: Check & Clean CMake
        run: |
          if [ -f Binaries/BaseExample/BaseExample ]; then
            echo "CMake build successful"
            cmake --build . --target clean
          else
            echo "CMake build failed: Executable not found"
            exit 84
          fi
