name: LinuxBuild

on:
  pull_request:
    branches: ["main"]

jobs:
  Build:
    name: BuildAndTest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v12

      - name: Build the project
        uses: nix build
