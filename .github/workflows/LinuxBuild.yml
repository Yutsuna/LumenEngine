name: LinuxBuild

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  Build:
    name: BuildAndTest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: SetupRuby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - name: InstallSystemDependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev \
            libxext-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libegl1-mesa-dev \
            libibus-1.0-dev

      - name: CacheVendor
        id: vendor-cache
        uses: actions/cache@v4
        with:
          path: Vendor
          key: Vendor-${{ runner.os }}-${{ hashFiles('Scripts/Dependencies/**/*.rb') }}

      - name: InstallDependencies
        if: steps.vendor-cache.outputs.cache-hit != 'true'
        run: ruby Scripts/Dependencies/InstallDependencies.rb

      - name: VerifyVendor
        run: |
          echo "Vendor directory contents:"
          ls -la Vendor/ || echo "Vendor directory not found"
          echo "SDL3 directory contents:"
          ls -la Vendor/SDL3/ || echo "SDL3 directory not found"
          echo "SDL3 include contents:"
          ls -la Vendor/SDL3/include/ || echo "SDL3 include not found"

      - name: SetupDotnet
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "10.0.100"

      - name: CacheNuGet
        id: nuget-cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: RunBuilder
        run: dotnet run --project Builder/Builder.csproj -- build --format ninja --config release

      - name: DebugBuildNinja
        run: |
          echo "=== Build.ninja SDL3 references ==="
          grep -n "SDL3" build.ninja || echo "No SDL3 references found"
          echo "=== LinuxBackend compile command ==="
          grep -A1 "LinuxBackend.cpp" build.ninja || echo "LinuxBackend not found"

      - name: InstallNinja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: BuildProject
        run: ninja

      - name: FindExecutable
        shell: bash
        run: |
          if [ -f Binaries/BaseExample/BaseExample ]; then
            echo "Executable found"
            exit 0
          else
            echo "Executable not found"
            exit 84
          fi
